<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>愛屋及鳥 GuardianNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nature-green': '#4CAF50',
                        'nature-dark': '#2E7D32',
                        'nature-light': '#E8F5E9',
                        'wood-brown': '#795548'
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* Prevent pull-to-refresh on mobile */
        }
        
        #map {
            height: calc(100vh - 64px - 60px); /* Adjust for header and bottom nav */
            width: 100%;
            z-index: 10;
        }

        /* Bottom Sheet Transition */
        #bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            z-index: 50;
        }
        
        #bottom-sheet.open {
            transform: translateY(0);
        }

        /* Custom Map Marker Pulse Effect */
        .pulse-marker {
            background: rgba(76, 175, 80, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <header class="bg-nature-green text-white h-16 flex items-center justify-between px-4 shadow-md z-20 relative">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-house-chimney-window text-xl"></i>
            <div>
                <h1 class="text-lg font-bold leading-tight">愛屋及鳥</h1>
                <p class="text-[10px] text-nature-light opacity-90 leading-tight">GuardianNest 智能鳥巢系統</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center">
                <i class="fa-solid fa-bell text-sm"></i>
            </button>
        </div>
    </header>

    <main id="map" class="flex-grow"></main>

    <nav class="bg-white h-[60px] border-t border-gray-200 flex justify-around items-center px-2 z-20 relative pb-safe">
        <button class="flex flex-col items-center justify-center w-16 text-nature-green">
            <i class="fa-solid fa-map-location-dot text-xl mb-1"></i>
            <span class="text-[10px] font-medium">分佈地圖</span>
        </button>
        <button class="flex flex-col items-center justify-center w-16 text-gray-400 hover:text-nature-green transition-colors">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span class="text-[10px] font-medium">生態統計</span>
        </button>
        <button class="flex flex-col items-center justify-center w-16 text-gray-400 hover:text-nature-green transition-colors">
            <i class="fa-solid fa-circle-info text-xl mb-1"></i>
            <span class="text-[10px] font-medium">關於計畫</span>
        </button>
    </nav>

    <div id="bottom-sheet" class="fixed inset-x-0 bottom-[60px] bg-white rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.1)] flex flex-col max-h-[85vh] overflow-y-auto">
        
        <div class="sticky top-0 bg-white pt-3 pb-2 px-5 flex flex-col items-center border-b border-gray-100 z-10 rounded-t-3xl" id="sheet-header">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mb-3 cursor-pointer" onclick="closeModal()"></div>
            <div class="flex justify-between w-full items-center">
                <div>
                    <h2 id="modal-title" class="text-xl font-bold text-gray-800">麗港城商場</h2>
                    <p id="modal-status" class="text-xs text-nature-green font-medium mt-1"><i class="fa-solid fa-circle-check mr-1"></i> 連線中 · 讀取即時數據</p>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>

        <div class="p-5 flex flex-col gap-5">
            
            <!-- WebRTC Stream Injection -->
            <div class="w-full aspect-video rounded-xl overflow-hidden relative shadow-inner bg-black">
                <!-- FIX: Removed 'pointer-events-none' to allow interaction -->
                <iframe src="http://10.93.164.19" class="w-full h-full border-0" allow="autoplay; fullscreen"></iframe>
                
                <!-- Decorative overlays need pointer-events-none so clicks pass through to the iframe -->
                <div class="absolute top-3 left-3 bg-red-600 text-white text-[10px] font-bold px-2 py-1 rounded-md flex items-center gap-1.5 animate-pulse pointer-events-none">
                    <div class="w-1.5 h-1.5 bg-white rounded-full"></div> LIVE
                </div>
                <div class="absolute top-3 right-3 bg-black/50 backdrop-blur-sm text-white text-[10px] px-2 py-1 rounded-md pointer-events-none" id="live-time">
                    --:--:--
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3" id="thingspeak-grid">
                <div class="col-span-2 text-center py-4 text-gray-500 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i>正在載入 ThingSpeak 數據...
                </div>
            </div>

            <button class="w-full bg-wood-brown hover:bg-[#654321] text-white py-3 rounded-xl font-bold transition-colors flex justify-center items-center gap-2 shadow-sm mt-2">
                <i class="fa-solid fa-clock-rotate-left"></i> 查看歷史影像紀錄
            </button>
            <div class="h-4"></div>
        </div>
    </div>

    <div id="backdrop" class="fixed inset-0 bg-black/40 z-40 hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- ThingSpeak Configuration ---
        const TS_CHANNEL_ID = '3337585';
        const TS_API_KEY = 'LMX9I1V3P7XDYUEA';
        const TS_API_URL = `https://api.thingspeak.com/channels/${TS_CHANNEL_ID}/feeds.json?api_key=${TS_API_KEY}&results=1`;

        // --- Single Nest Location (Laguna Plaza) ---
        const lagunaPlaza = { 
            name: "麗港城商場 (Laguna Plaza)", 
            lat: 22.3066, 
            lng: 114.2278 
        };

        // --- Initialize Map ---
        const map = L.map('map', {
            zoomControl: false
        }).setView([lagunaPlaza.lat, lagunaPlaza.lng], 16);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        L.control.zoom({ position: 'topright' }).addTo(map);

        // Custom Icon Creation
        const createCustomIcon = () => {
            return L.divIcon({
                html: `
                    <div style="position: relative; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px;">
                        <div class="pulse-marker" style="position: absolute; width: 100%; height: 100%; background: #4CAF5080;"></div>
                        <div style="background-color: #4CAF50; border: 2px solid white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
                            <i class="fa-solid fa-house-chimney-window text-white text-[10px]"></i>
                        </div>
                    </div>
                `,
                className: 'custom-nest-icon',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });
        };

        // Add Marker
        const marker = L.marker([lagunaPlaza.lat, lagunaPlaza.lng], {
            icon: createCustomIcon()
        }).addTo(map);

        marker.on('click', () => {
            openModal(lagunaPlaza);
            fetchThingSpeakData(); // Fetch real data when clicked
            map.setView([lagunaPlaza.lat - 0.002, lagunaPlaza.lng], 16, {
                animate: true,
                duration: 0.5
            });
        });

        // --- Bottom Sheet Logic ---
        const bottomSheet = document.getElementById('bottom-sheet');
        const backdrop = document.getElementById('backdrop');

        function openModal(data) {
            document.getElementById('modal-title').innerText = data.name;
            
            // Reset Grid state
            document.getElementById('thingspeak-grid').innerHTML = `
                <div class="col-span-2 text-center py-4 text-gray-500 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i>正在載入即時數據...
                </div>
            `;

            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                bottomSheet.classList.add('open');
            }, 10);
        }

        function closeModal() {
            bottomSheet.classList.remove('open');
            backdrop.classList.add('opacity-0');
            setTimeout(() => { backdrop.classList.add('hidden'); }, 300);
        }

        // --- Fetch & Display ThingSpeak Data ---
        async function fetchThingSpeakData() {
            try {
                const response = await fetch(TS_API_URL);
                const data = await response.json();
                
                const channel = data.channel;
                const feed = data.feeds[0]; // Get latest record
                
                let gridHTML = '';
                const colors = [
                    { bg: 'bg-orange-50', border: 'border-orange-100', iconBg: 'bg-orange-500', icon: 'fa-temperature-half' },
                    { bg: 'bg-cyan-50', border: 'border-cyan-100', iconBg: 'bg-cyan-500', icon: 'fa-droplet' },
                    { bg: 'bg-blue-50', border: 'border-blue-100', iconBg: 'bg-blue-500', icon: 'fa-wind' },
                    { bg: 'bg-nature-light', border: 'border-green-100', iconBg: 'bg-nature-green', icon: 'fa-leaf' }
                ];

                let colorIndex = 0;

                // Loop through fields 1 to 8 dynamically based on API response
                for (let i = 1; i <= 8; i++) {
                    const fieldName = channel[`field${i}`];
                    const fieldValue = feed ? feed[`field${i}`] : null;

                    if (fieldName) {
                        const style = colors[colorIndex % colors.length];
                        const valDisplay = (fieldValue !== null && fieldValue !== "") ? fieldValue : "無數據";
                        
                        gridHTML += `
                            <div class="${style.bg} p-3 rounded-xl border ${style.border} flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full ${style.iconBg} text-white flex items-center justify-center flex-shrink-0">
                                    <i class="fa-solid ${style.icon}"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-500 mb-0.5">${fieldName}</p>
                                    <p class="text-lg font-bold text-gray-800 leading-none">${valDisplay}</p>
                                </div>
                            </div>
                        `;
                        colorIndex++;
                    }
                }

                if(gridHTML === '') {
                    gridHTML = '<div class="col-span-2 text-center text-sm text-gray-500">此頻道尚未設定任何欄位</div>';
                }

                document.getElementById('thingspeak-grid').innerHTML = gridHTML;
                document.getElementById('modal-status').innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> 系統運作正常 · 更新時間: ${new Date(feed.created_at).toLocaleTimeString()}`;

            } catch (error) {
                console.error("Error fetching ThingSpeak data:", error);
                document.getElementById('thingspeak-grid').innerHTML = `
                    <div class="col-span-2 text-center py-4 text-red-500 text-sm">
                        <i class="fa-solid fa-triangle-exclamation mr-2"></i>無法取得 ThingSpeak 數據
                    </div>
                `;
            }
        }

        // Live Timer Update Simulation
        setInterval(() => {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('live-time').innerText = timeStr;
        }, 1000);

        setTimeout(() => { map.invalidateSize(); }, 100);

    </script>
</body>
</html>
